<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Box</title>

<style>
body{
    font-family:sans-serif;
    background:#111;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.gallery img{
    width:100%;
    border-radius:12px;
}
</style>
</head>

<body>

<h1>📷 Photo Box</h1>

<div class="gallery">

<img src="https://picsum.photos/500?1">
<img src="https://picsum.photos/500?2">
<img src="https://picsum.photos/500?3">

</div>

</body>
</html>
